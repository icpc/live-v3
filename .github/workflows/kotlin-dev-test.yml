name: Weekly Kotlin Dev Upgrade

on:
  schedule:
    - cron: '0 1 * * 6'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual testing of Kotlin dev upgrade'

jobs:
  upgrade-kotlin:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@master
        with:
          ref: kotlin-test-dev-version
          fetch-depth: 0

      - name: Rebase onto Main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Fetching latest main..."
          git fetch origin main
          
          echo "Attempting rebase..."
          git rebase origin/main        

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v3
        with:
          node-version: '22.20.0'
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Store Playwright's Version
        working-directory: ./src/frontend/tests
        run: |
          PLAYWRIGHT_VERSION=$(pnpm list @playwright/test | grep @playwright | sed 's/.*@//')
          echo "Playwright's Version: $PLAYWRIGHT_VERSION"
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV

      - name: Cache Playwright Browsers for Playwright's Version
        id: cache-playwright-browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers2-${{ env.PLAYWRIGHT_VERSION }}

      - name: Setup Playwright
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        working-directory: ./src/frontend/tests
        run: pnpm exec playwright install

      - uses: actions/setup-java@master
        with:
          distribution: adopt
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Upgrade Task
        run: ./gradlew upgradeKotlinDev --no-daemon

      - name: Build with gradle
        run: ./gradlew build release apiCheck --scan -Pnpm.download=false

      - name: Commit and Force-Push
        if: success()
        run: |
          # Check for changes in the version catalog or from the rebase
          echo "Changes detected. Committing..."
          KOTLIN_VERSION=$(grep "^kotlin\s*=" gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')
          git add gradle/libs.versions.toml
          git commit --allow-empty -m "Weekly Auto-upgrade: kotlin version ${KOTLIN_VERSION}"
        
          # Force push is required because we modified the history via rebase
          git push origin HEAD:kotlin-test-dev-version --force
